name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  branch-name:
    name: Validate branch name
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check branch name
        run: |
          BRANCH="${{ github.head_ref }}"
          # Allowed prefixes
          ALLOWED=("feat/" "fix/" "bench/" "docs/" "ci/" "test/" "refactor/" "perf/" "build/" "chore/" "alpha/")
          # Protected branches
          PROTECTED=("main" "master" "develop" "gh-pages")
          VALID=false
          for special in "${PROTECTED[@]}"; do
            if [ "$BRANCH" = "$special" ]; then
              VALID=true
              break
            fi
          done
          if [ "$VALID" = false ]; then
            for prefix in "${ALLOWED[@]}"; do
              if [[ "$BRANCH" == "$prefix"* ]]; then
                VALID=true
                break
              fi
            done
          fi
          if [ "$VALID" = false ]; then
            echo "::error::Branch '$BRANCH' does not follow naming conventions."
            echo "Allowed prefixes: feat/ fix/ bench/ docs/ ci/ test/ refactor/ perf/ build/ chore/ alpha/"
            exit 1
          fi
          echo "Branch '$BRANCH' is valid."

  build-and-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux GCC
            cxx: g++
          - os: ubuntu-latest
            name: Linux Clang
            cxx: clang++
          - os: macos-latest
            name: macOS Apple Clang
            cxx: c++
          - os: windows-latest
            name: Windows MSVC
            cxx: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DTEXERE_BUILD_TESTS=ON \
            -DTEXERE_BUILD_BENCHMARKS=OFF
        env:
          CXX: ${{ matrix.cxx }}
        shell: bash

      - name: Build
        run: cmake --build build --config Release
        shell: bash

      - name: Test
        run: ctest --test-dir build --build-config Release --output-on-failure
        shell: bash

  coverage:
    name: Coverage (Linux GCC)
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install lcov
        run: sudo apt-get install -y lcov

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="--coverage" \
            -DTEXERE_BUILD_TESTS=ON \
            -DTEXERE_BUILD_BENCHMARKS=OFF
        env:
          CXX: g++

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Capture coverage
        run: |
          lcov --capture --directory build --output-file coverage.info
          lcov --remove coverage.info '/usr/*' '*/_deps/*' '*/tests/*' --output-file coverage.info
          lcov --list coverage.info

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.info
          fail_ci_if_error: false

  benchmark:
    name: Benchmark (Linux GCC)
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DTEXERE_BUILD_TESTS=OFF \
            -DTEXERE_BUILD_BENCHMARKS=ON
        env:
          CXX: g++

      - name: Build
        run: cmake --build build

      - name: Run benchmarks
        run: ./build/benchmarks/texere_bench --benchmark_format=json > benchmark_results.json

      - name: Ensure gh-pages branch exists
        run: |
          git fetch origin gh-pages 2>/dev/null || {
            git checkout --orphan gh-pages &&
            git reset --hard &&
            git config user.name "github-actions[bot]" &&
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com" &&
            git commit --allow-empty -m "Initialize gh-pages branch" &&
            git push origin gh-pages &&
            git checkout main
          }

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: 'googlecpp'
          output-file-path: benchmark_results.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: '200%'
          comment-on-alert: true
          fail-on-alert: true

      - name: Deploy comparison dashboard
        run: |
          cp docs/comparison.html /tmp/comparison.html
          git fetch origin gh-pages
          git checkout gh-pages
          cp /tmp/comparison.html dev/bench/comparison.html
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dev/bench/comparison.html
          if git diff --cached --quiet; then
            echo "comparison.html unchanged — skipping commit"
          else
            git commit -m "Update comparison dashboard"
            git push origin gh-pages
          fi
