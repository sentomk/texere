name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux GCC
            cxx: g++
          - os: ubuntu-latest
            name: Linux Clang
            cxx: clang++
          - os: macos-latest
            name: macOS Apple Clang
            cxx: c++
          - os: windows-latest
            name: Windows MSVC
            cxx: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DTEXERE_BUILD_TESTS=ON \
            -DTEXERE_BUILD_BENCHMARKS=OFF
        env:
          CXX: ${{ matrix.cxx }}
        shell: bash

      - name: Build
        run: cmake --build build --config Release
        shell: bash

      - name: Test
        run: ctest --test-dir build --build-config Release --output-on-failure
        shell: bash

  coverage:
    name: Coverage (Linux GCC)
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install lcov
        run: sudo apt-get install -y lcov

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="--coverage" \
            -DTEXERE_BUILD_TESTS=ON \
            -DTEXERE_BUILD_BENCHMARKS=OFF
        env:
          CXX: g++

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Capture coverage
        run: |
          lcov --capture --directory build --output-file coverage.info
          lcov --remove coverage.info '/usr/*' '*/_deps/*' '*/tests/*' --output-file coverage.info
          lcov --list coverage.info

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.info
          fail_ci_if_error: false

  benchmark:
    name: Benchmark (Linux GCC)
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DTEXERE_BUILD_TESTS=OFF \
            -DTEXERE_BUILD_BENCHMARKS=ON
        env:
          CXX: g++

      - name: Build
        run: cmake --build build

      - name: Run benchmarks
        run: ./build/benchmarks/texere_bench --benchmark_format=json > benchmark_results.json

      - name: Ensure gh-pages branch exists
        run: |
          git fetch origin gh-pages 2>/dev/null || {
            git checkout --orphan gh-pages &&
            git reset --hard &&
            git config user.name "github-actions[bot]" &&
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com" &&
            git commit --allow-empty -m "Initialize gh-pages branch" &&
            git push origin gh-pages &&
            git checkout main
          }

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: 'googlecpp'
          output-file-path: benchmark_results.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: '200%'
          comment-on-alert: true
          fail-on-alert: true
