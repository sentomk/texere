name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux GCC
            cxx: g++
          - os: ubuntu-latest
            name: Linux Clang
            cxx: clang++
          - os: macos-latest
            name: macOS Apple Clang
            cxx: c++
          - os: windows-latest
            name: Windows MSVC
            cxx: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DTEXERE_BUILD_TESTS=ON \
            -DTEXERE_BUILD_BENCHMARKS=OFF
        env:
          CXX: ${{ matrix.cxx }}
        shell: bash

      - name: Build
        run: cmake --build build --config Release
        shell: bash

      - name: Test
        run: ctest --test-dir build --build-config Release --output-on-failure
        shell: bash
