name: Docs

on:
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'tools/check_docs.py'
      - '.github/workflows/docs.yml'
  push:
    branches:
      - 'docs/**'
    paths:
      - 'docs/**'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'tools/check_docs.py'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

jobs:
  docs-check:
    name: Docs Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run docs checks
        run: python3 tools/check_docs.py
